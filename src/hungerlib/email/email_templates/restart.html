<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Server Restart</title>
    <style>
      body { font-family: Arial, sans-serif; background:#f4f6f9; margin:0; padding:20px; }
      .card { background:#fff; border-radius:10px; padding:20px; max-width:600px; margin:0 auto; box-shadow:0 6px 18px rgba(0,0,0,0.06); }
      h1 { color:#2b6df6; }
      p { color:#333; }
      .meta { font-size:13px; color:#666; margin-top:12px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Server {{ server_name }} Restart Scheduled</h1>
      <p>The server {{ server_name }} will restart at {{ time }}.</p>
      <p class="meta">Triggered by: {{ trigger }}</p>
    </div>
  </body>
</html>
