<div style="background:#fff; border-radius:10px; padding:20px; max-width:600px; margin:0 auto;
            box-shadow:0 6px 18px rgba(0,0,0,0.06); font-family: Arial, sans-serif;">

  <h1 style="color:#2b6df6; margin-bottom:20px;">
    Server {{ server_name }} Restart Scheduled
  </h1>

  <p style="color:#333; font-size:16px; line-height:1.6;">
    The server <strong>{{ server_name }}</strong> will restart at <strong>{{ time }}</strong>.
  </p>

  <p style="font-size:13px; color:#666; margin-top:12px;">
    Triggered by: {{ trigger }}
  </p>

</div>
