<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ title }}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #eef1f5;
      font-family: Arial, sans-serif;
    }

    .wrapper {
      width: 100%;
      text-align: center;
      padding: 40px 0;
    }

    .box {
      background: #ffffff;
      width: 90%;
      max-width: 600px;
      margin: 0 auto;
      padding: 30px;
      border-radius: 14px;
      border: 1px solid #d9dce3;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      color: #4a6cf7;
      margin-bottom: 20px;
      font-size: 28px;
    }

    p {
      color: #333;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .button {
      display: inline-block;
      padding: 12px 24px;
      background: #4a6cf7;
      color: #ffffff !important;
      text-decoration: none;
      border-radius: 6px;
      font-size: 16px;
      margin-top: 20px;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="box">
      <h1>{{ heading }}</h1>

      <p>
        {{ message }}
      </p>

      <p>
        • Server status updates<br>
        • Crash reports<br>
        • Notifications<br>
        • Alerts<br>
      </p>

      <a class="button" href="{{ button_url }}">{{ button_text }}</a>

      <p class="footer">
        {{ footer }}
      </p>
    </div>
  </div>
</body>
</html>
